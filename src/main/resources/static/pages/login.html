<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Marketplace</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">StudentMarketPlace</div>
            <div class="auth-buttons"></div>
        </nav>
    </header>

    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h2 class="auth-title">Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="your.email@college.edu" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="••••••••••" required>
                    </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
                </form>

                <div class="auth-link">
                        New to Student Marketplace? <a href="/pages/register.html">Create an account</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await Auth.login(email, password);
            } catch (error) {
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
